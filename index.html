<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Inter', sans-serif;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(255, 120, 80, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(80, 200, 255, 0.05) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(2%, 3%) rotate(1deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
      text-align: center;
      padding: 4rem 3rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      line-height: 0.5;
      color: rgba(255, 255, 255, 0.08);
      display: block;
      margin-bottom: 1.5rem;
      user-select: none;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 700;
      font-style: italic;
      color: #f0ede8;
      line-height: 1.45;
      letter-spacing: -0.01em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      margin: 0 auto 2rem;
      border-radius: 999px;
    }

    .quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .quote-author::before {
      content: '— ';
      opacity: 0.6;
    }

    .date-badge {
      position: absolute;
      top: 1.5rem;
      right: 1.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="date-badge" id="dateBadge"></span>
    <span class="quote-mark">"</span>
    <!-- QUOTE_TEXT_START -->
    <p class="quote-text" id="quoteText">Tell me and I forget. Teach me and I remember. Involve me and I learn.</p>
    <!-- QUOTE_TEXT_END -->
    <div class="divider"></div>
    <!-- QUOTE_AUTHOR_START -->
    <p class="quote-author" id="quoteAuthor">Benjamin Franklin</p>
    <!-- QUOTE_AUTHOR_END -->
  </div>

  <script>
    const now = new Date();
    document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
  </script>
</body>
</html>
