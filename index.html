<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      overflow: hidden;
    }

    /* Glowing white shine effect */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 40%, rgba(180, 140, 255, 0.18) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 25%, rgba(100, 200, 255, 0.15) 0%, transparent 45%),
                  radial-gradient(ellipse at 50% 75%, rgba(255, 160, 200, 0.12) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    /* Shimmering light sweep */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(105deg, transparent 30%, rgba(255, 255, 255, 0.9) 50%, transparent 70%);
      animation: shine 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(2%, 3%) rotate(1deg); }
    }

    @keyframes shine {
      0%   { left: -100%; opacity: 0; }
      10%  { opacity: 1; }
      100% { left: 150%; opacity: 0; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(160, 120, 255, 0.08), 0 0 80px rgba(100, 180, 255, 0.06), 0 8px 32px rgba(0, 0, 0, 0.04); }
      50%      { box-shadow: 0 0 60px rgba(160, 120, 255, 0.14), 0 0 120px rgba(100, 180, 255, 0.10), 0 8px 32px rgba(0, 0, 0, 0.06); }
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
      text-align: center;
      padding: 4rem 3rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(200, 200, 220, 0.3);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      animation: fadeIn 1.2s ease both, pulseGlow 4s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      line-height: 0.5;
      color: rgba(140, 100, 220, 0.15);
      display: block;
      margin-bottom: 1.5rem;
      user-select: none;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 700;
      font-style: italic;
      color: #1a1a2e;
      line-height: 1.45;
      letter-spacing: -0.01em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(140, 100, 220, 0.4), transparent);
      margin: 0 auto 2rem;
      border-radius: 999px;
    }

    .quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: rgba(26, 26, 46, 0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .quote-author::before {
      content: '— ';
      opacity: 0.6;
    }

    .date-badge {
      position: absolute;
      top: 1.5rem;
      right: 1.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(26, 26, 46, 0.25);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="date-badge" id="dateBadge"></span>
    <span class="quote-mark">"</span>
    <!-- QUOTE_TEXT_START -->
    <p class="quote-text" id="quoteText">The way to get started is to quit talking and begin doing.</p>
    <!-- QUOTE_TEXT_END -->
    <div class="divider"></div>
    <!-- QUOTE_AUTHOR_START -->
    <p class="quote-author" id="quoteAuthor">Walt Disney</p>
    <!-- QUOTE_AUTHOR_END -->
  </div>

  <script>
    const now = new Date();
    document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
  </script>
</body>
</html>
